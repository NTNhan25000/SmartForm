<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Person 5 - AI Chatbox & Responsive Polish</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- MAIN EDITOR -->
        <main class="editor-main">
            <div class="editor-content">
                <h1>GG Form Editor</h1>
                <p>Nội dung form sẽ ở đây...</p>
                <div class="placeholder-cards">
                    <div class="card-placeholder"></div>
                    <div class="card-placeholder"></div>
                    <div class="card-placeholder"></div>
                </div>
            </div>
        </main>

        <!-- AI CHATBOX -->
        <div class="ai-chatbox-wrapper">
            <button class="ai-toggle-btn" id="aiToggleBtn" title="Mở AI Assistant">
                <span class="ai-icon">✨</span>
            </button>

            <!-- Chatbox Panel -->
            <div class="ai-chatbox" id="aiChatbox">
                <div class="chatbox-header">
                    <div class="header-content">
                        <h3>AI Assistant</h3>
                        <div class="ai-status">
                            <span class="status-dot online"></span>
                            <span class="status-text">Sẵn sàng</span>
                        </div>
                    </div>
                    <button class="header-btn" id="aiRefreshBtn" title="Làm mới">🔄</button>
                    <button class="header-btn" id="aiCloseBtn" title="Đóng">✕</button>
                </div>

                <div class="chatbox-messages" id="messagesContainer">
                    <!-- Initial greeting -->
                    <div class="message ai-message">
                        <div class="message-bubble">
                            Xin chào! 👋 Tôi là trợ lý AI của bạn. Tôi có thể giúp bạn:
                        </div>
                    </div>
                    <div class="message ai-message">
                        <div class="message-bubble">
                            • Tạo các câu hỏi tốt cho form<br>
                            • Cải thiện mô tả<br>
                            • Gợi ý câu trả lời
                        </div>
                    </div>
                </div>

                <!-- Quick Actions -->
                <div class="quick-actions">
                    <button class="quick-action-btn" data-action="suggest-questions">
                        💡 Gợi ý câu hỏi
                    </button>
                    <button class="quick-action-btn" data-action="improve-title">
                        ✏️ Cải thiện tiêu đề
                    </button>
                    <button class="quick-action-btn" data-action="add-questions">
                        ➕ Thêm câu hỏi
                    </button>
                </div>

                <!-- Input Area -->
                <div class="chatbox-input-area">
                    <input type="text" class="chatbox-input" id="chatInput" placeholder="Nhập câu hỏi...">
                    <button class="send-btn" id="sendBtn">➤</button>
                </div>
            </div>
        </div>

        <!-- TOAST NOTIFICATIONS -->
        <div class="toast-container" id="toastContainer"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
